<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order confirmed — Tuna Kawano</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f0;
      color: #111;
      font-family: 'Courier', 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      border: 2px solid #111;
      padding: 48px 40px;
      text-align: center;
    }
    h1 { font-size: 1.6rem; font-weight: normal; margin-bottom: 20px; }
    p  { font-size: 14px; color: #555; margin-bottom: 14px; }
    a  { color: #111; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #111; text-decoration: none; }
    a:hover { opacity: 0.6; }
    .emoji { font-size: 2rem; margin-bottom: 20px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🐟</span>
    <h1>Order confirmed!</h1>
    <p>Thank you so much. You'll receive a confirmation email shortly.</p>
    <p>If you ordered a print-on-demand item (tote, tee, etc.) it usually ships within 3–5 business days. Hand-packed items ship within 1–2 weeks.</p>
    <p style="margin-top:32px;">
      <a href="/">← Back to the shop</a>
    </p>
  </div>
</body>
</html>
