<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ship Order — Tuna Kawano</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f0;
      color: #111;
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      border: 2px solid #111;
      padding: 40px;
    }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 32px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 6px; margin-top: 20px; }
    input, textarea {
      width: 100%;
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 14px;
      color: #111;
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #111; }
    textarea { resize: vertical; min-height: 100px; }
    .preview {
      background: #fff;
      border: 1px solid #ddd;
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      color: #333;
      white-space: pre-wrap;
      margin-top: 8px;
      min-height: 60px;
    }
    .btn {
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: #111;
      color: #f5f4f0;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      width: 100%;
      margin-top: 28px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .status {
      margin-top: 16px;
      font-size: 13px;
      padding: 10px 14px;
      display: none;
    }
    .status.success { background: #f0f7f0; border: 1px solid #c8e0c8; color: #2a7a2a; }
    .status.error   { background: #fff0f0; border: 1px solid #e0c8c8; color: #7a2a2a; }

    /* ── Login screen ── */
    #loginScreen { display: flex; flex-direction: column; gap: 16px; }
    #loginScreen h1 { margin-bottom: 0; }
    #loginError { font-size: 13px; color: #7a2a2a; display: none; }

    /* ── Main screen ── */
    #mainScreen { display: none; }
    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: #888; border-bottom: 1px solid #ddd; padding-bottom: 8px;
      margin-top: 28px; margin-bottom: 4px;
    }
    .section-title:first-child { margin-top: 0; }
    .tracking-link { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
<div class="card">

  <!-- ── Login ─────────────────────────────────────────── -->
  <div id="loginScreen">
    <div>
      <h1>🐟 Ship an order</h1>
      <div class="subtitle">Tuna Kawano — admin only</div>
    </div>
    <div>
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" placeholder="enter password"
        onkeydown="if(event.key==='Enter') login()" />
    </div>
    <div id="loginError">Wrong password. Try again.</div>
    <button class="btn" onclick="login()">Log in</button>
  </div>

  <!-- ── Main ──────────────────────────────────────────── -->
  <div id="mainScreen">
    <h1>🐟 Ship an order</h1>
    <div class="subtitle">Sends a shipping confirmation email to your customer.</div>

    <div class="section-title">Customer</div>
    <label for="customerEmail">Customer email</label>
    <input type="email" id="customerEmail" placeholder="customer@example.com" oninput="updatePreview()" />

    <label for="customerName">Customer name <span style="color:#aaa;font-size:11px;">(optional)</span></label>
    <input type="text" id="customerName" placeholder="Jane" oninput="updatePreview()" />

    <div class="section-title" style="margin-top:28px;">Shipment</div>
    <label for="trackingNumber">Tracking number</label>
    <input type="text" id="trackingNumber" placeholder="e.g. 1234 5678 9012" oninput="updatePreview()" />

    <label for="carrier">Carrier</label>
    <input type="text" id="carrier" placeholder="Canada Post" value="Canada Post" oninput="updatePreview()" />

    <label for="orderSummary">What's in the order <span style="color:#aaa;font-size:11px;">(optional — shows in email)</span></label>
    <input type="text" id="orderSummary" placeholder="e.g. 3 stickers + Laputa print" oninput="updatePreview()" />

    <div class="section-title" style="margin-top:28px;">Email preview</div>
    <div class="preview" id="emailPreview"></div>

    <button class="btn" id="sendBtn" onclick="sendTracking()">Send shipping confirmation →</button>
    <div class="status" id="statusMsg"></div>
  </div>

</div>

<script>
  // ── Password ────────────────────────────────────────────────────────────
  // Change this to whatever you want your admin password to be.
  // This is client-side only — fine for personal use on a low-traffic admin page.
  const ADMIN_PASSWORD = 'tuna2024';

  function login() {
    const val = document.getElementById('passwordInput').value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      updatePreview();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  // ── Preview builder ─────────────────────────────────────────────────────
  function updatePreview() {
    const name     = document.getElementById('customerName').value.trim();
    const tracking = document.getElementById('trackingNumber').value.trim();
    const carrier  = document.getElementById('carrier').value.trim() || 'Canada Post';
    const summary  = document.getElementById('orderSummary').value.trim();

    const greeting = name ? `Hi ${name},` : 'Hi there,';
    const itemLine = summary ? `\nOrder: ${summary}\n` : '';
    const trackLine = tracking
      ? `Tracking number: ${tracking}\nCarrier: ${carrier}\n\nTrack your package: https://www.canadapost-postescanada.ca/track-reperage/en#/search?searchFor=${encodeURIComponent(tracking)}`
      : 'Tracking number: [enter above]';

    document.getElementById('emailPreview').textContent =
`${greeting}

Your order from Tuna Kawano has shipped! 🐟
${itemLine}
${trackLine}

It should arrive within 5–10 business days depending on your location. If you have any questions, just reply to this email.

Thank you so much for your support — it means the world 🫶

Luna
tunakawano.com`;
  }

  // ── Send ────────────────────────────────────────────────────────────────
  async function sendTracking() {
    const email    = document.getElementById('customerEmail').value.trim();
    const name     = document.getElementById('customerName').value.trim();
    const tracking = document.getElementById('trackingNumber').value.trim();
    const carrier  = document.getElementById('carrier').value.trim() || 'Canada Post';
    const summary  = document.getElementById('orderSummary').value.trim();
    const status   = document.getElementById('statusMsg');
    const btn      = document.getElementById('sendBtn');

    if (!email) { showStatus('error', 'Please enter the customer email.'); return; }
    if (!tracking) { showStatus('error', 'Please enter a tracking number.'); return; }

    btn.disabled = true;
    btn.textContent = 'Sending...';
    status.style.display = 'none';

    try {
      const res = await fetch('/.netlify/functions/send-tracking', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name, tracking, carrier, summary }),
      });

      const data = await res.json();

      if (res.ok) {
        showStatus('success', `✓ Shipping confirmation sent to ${email}`);
        // Clear fields for next order
        document.getElementById('customerEmail').value = '';
        document.getElementById('customerName').value = '';
        document.getElementById('trackingNumber').value = '';
        document.getElementById('orderSummary').value = '';
        updatePreview();
      } else {
        showStatus('error', `Failed: ${data.error || 'Unknown error'}`);
      }
    } catch (err) {
      showStatus('error', 'Network error — check your connection and try again.');
    }

    btn.disabled = false;
    btn.textContent = 'Send shipping confirmation →';
  }

  function showStatus(type, msg) {
    const el = document.getElementById('statusMsg');
    el.className = `status ${type}`;
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Init preview
  updatePreview();
</script>
</body>
</html>
